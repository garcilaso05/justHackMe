<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>justHackMe - Terminal Quest</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo">💻</span>
          <div>
            <h1>justHackMe</h1>
            <p id="level-name">Nivel 1</p>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="label">Tiempo</span>
            <span id="level-timer">Sin límite</span>
          </div>
          <div class="stat">
            <span class="label">Puntuación</span>
            <span id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">Progreso</span>
            <span id="progress">1 / 1</span>
          </div>
        </div>
        <nav id="level-nav" class="level-nav" aria-label="Niveles"></nav>
      </header>

      <main class="layout-shell">
        <aside id="sidebar" class="sidebar" aria-label="Objetivos y pistas">
          <div class="panel-header">
            <h2>Objetivo del nivel</h2>
          </div>
          <p id="level-description"></p>
          <div class="sidebar-actions">
            <button id="reset-level" class="ghost">Reiniciar</button>
          </div>
          <div class="sidebar-divider"></div>
          <div class="panel-header">
            <h2>Pistas</h2>
            <button id="hint-button" class="primary">Mostrar pista</button>
          </div>
          <ul id="hint-list" class="hint-list"></ul>
        </aside>
        <button id="sidebar-handle" class="sidebar-handle" aria-label="Mostrar u ocultar panel">
          <span class="sidebar-arrow">◀</span>
        </button>

        <div class="workspace">
          <div class="workspace-grid">
            <section class="panel blocks" aria-label="Bloques disponibles">
              <div class="panel-header">
                <h2>Bloques disponibles</h2>
                <span class="pill" id="block-count">0</span>
              </div>
              <div id="block-list" class="block-list"></div>
            </section>

            <section class="panel composer" aria-label="Secuencia de comandos">
              <div class="panel-header">
                <h2>Secuencia de comandos</h2>
                <button id="run-sequence" class="primary">Ejecutar</button>
              </div>
              <div id="drop-zone" class="drop-zone">
                <p class="empty">Arrastra bloques aquí para construir tu script.</p>
              </div>
            </section>
          </div>
    
          <!-- Level selector moved to top nav -->

          <section class="panel terminal" aria-label="Terminal">
            <div class="panel-header">
              <h2>Terminal</h2>
              <div class="terminal-actions">
                <button id="clear-terminal" class="ghost">Limpiar</button>
              </div>
            </div>
            <div id="terminal-output" class="terminal-output"></div>
            <div class="terminal-input-row">
              <input id="terminal-input" class="terminal-input" placeholder="Escribe un comando y pulsa Enter (ej: ls, view carpeta1/img1.jpg, hackimg ...)" />
            </div>
          </section>
        </div>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
